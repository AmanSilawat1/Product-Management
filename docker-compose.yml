services:
  postgres:
    image: postgres:16
    container_name: pm_postgres
    restart: always
    environment:
      POSTGRES_USER: pm_user
      POSTGRES_PASSWORD: pm_password
      POSTGRES_DB: pm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pm_backend
    ports:
      - "3000:3000"
    environment:
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=pm_user
      - DB_PASSWORD=pm_password
      - DB_DATABASE=pm_db
      - PORT=3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: pm_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
